<h2>{{trade}} Dashboard</h2>

<h3>Videos</h3>
{% for v in videos %}
<p>{{v[2]}}</p>
<video width="300" controls>
  <source src="{{ url_for('static', filename='uploads/' + v[3]) }}">
</video>
{% endfor %}

<h3>PDFs</h3>
{% for p in pdfs %}
<iframe src="{{ url_for('static', filename='uploads/' + p[2]) }}" width="100%" height="300"></iframe>
<a href="{{ url_for('static', filename='uploads/' + p[2]) }}" download>Download</a>
{% endfor %}

<h3>Notes</h3>
{% for n in notes %}
<p>{{n[2]}}</p>
{% endfor %}

<h3>Quiz</h3>
<form method="post" action="/submit_quiz/{{trade}}">
{% for q in quiz %}
<p>{{q[2]}}</p>
<input type="radio" name="{{q[0]}}" value="{{q[3]}}"> {{q[3]}}<br>
<input type="radio" name="{{q[0]}}" value="{{q[4]}}"> {{q[4]}}<br>
<input type="radio" name="{{q[0]}}" value="{{q[5]}}"> {{q[5]}}<br>
<input type="radio" name="{{q[0]}}" value="{{q[6]}}"> {{q[6]}}<br>
<hr>
{% endfor %}
<button>Submit</button>
</form>
