{% extends "base.html" %}
{% block content %}
<h2>Admin Panel</h2>

<h3>Upload Video</h3>
<form method="post" enctype="multipart/form-data">
<input name="title" placeholder="Title" required>
<input type="file" name="file" required>
<button name="video">Upload Video</button>
</form>

<h3>Upload PDF</h3>
<form method="post" enctype="multipart/form-data">
<input type="file" name="file" required>
<button name="pdf">Upload PDF</button>
</form>

<h3>Add Note</h3>
<form action="/add_note" method="post">
<input name="content" placeholder="Note" required>
<button>Add Note</button>
</form>

<h3>Add MCQ</h3>
<form action="/add_quiz" method="post">
<input name="q" placeholder="Question" required><br>
<input name="o1" placeholder="Option 1" required><br>
<input name="o2" placeholder="Option 2" required><br>
<input name="o3" placeholder="Option 3" required><br>
<input name="o4" placeholder="Option 4" required><br>
<input name="ans" placeholder="Correct Option (1-4)" required><br>
<button>Add MCQ</button>
</form>
{% endblock %}
